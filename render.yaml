services:
  - type: web
    name: voice-trainer
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VOICE_ADMIN_TOKEN
        sync: false
      - key: VOICE_DATABASE_URL
        sync: false
      - key: VOICE_CEREBRAS_API_KEY
        sync: false
      - key: VOICE_GROQ_API_KEY
        sync: false
      - key: VOICE_GROQ_QWEN_API_KEY
        sync: false
      - key: VOICE_NVIDIA_API_KEY
        sync: false
      - key: VOICE_ROS_IMPORT_SECRET
        sync: false
      - key: VOICE_ROS_IMPORT_URL
        sync: false
